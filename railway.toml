[build]
  builder = "nixpacks"
  buildCommand = "composer install --no-dev --optimize-autoloader && npm install --ignore-scripts && npm run build && php artisan storage:link"

[deploy]
  startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
  healthcheckPath = "/up"
  restartPolicyType = "always"

[deploy.worker]
  startCommand = "php artisan queue:work --sleep=3 --tries=3"
