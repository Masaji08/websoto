[build]
  builder = "nixpacks"

[deploy]
  startCommand = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
  healthcheckPath = "/up"
  healthcheckTimeout = 300
  restartPolicyType = "always"

[deploy.worker]
  startCommand = "php artisan queue:work --sleep=3 --tries=3"
